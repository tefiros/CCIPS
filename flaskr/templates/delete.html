<!-- Inherit the base template to maintain the common structure -->
{% extends "base.html" %}

{% block title %}Delete{% endblock %}

{% block content %}

    <h1>Delete Tunnel</h1>
    <p>Introduce the tunnel ID to delete it</p>

    <!-- Form for tunnel deletion, it sends a POST request -->
    <form method="post">
        <label for="data_id">Select Tunnel ID:</label>
        <select id="delete_id" name="delete_id">
            <option value="">-- Select Tunnel --</option>
        </select>
        <button type="submit">Delete</button>
    </form>

    <script>
        // Poblar el dropdown con los IDs obtenidos desde /ccips-all
        window.onload = function() {
            let select = document.getElementById("delete_id");
            fetch('/ccips-all')
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Error fetching tunnel list: ${response.status} ${response.statusText}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (Array.isArray(data)) {
                        data.forEach(id => {
                            let option = document.createElement("option");
                            option.value = id;
                            option.text = id;
                            select.appendChild(option);
                        });
                    } else {
                        console.error('Expected array of IDs, got:', data);
                        let errorOption = document.createElement("option");
                        errorOption.value = "";
                        errorOption.text = "Formato de respuesta inválido";
                        select.appendChild(errorOption);
                    }
                })
                .catch(err => {
                    console.error(err);
                    let errorOption = document.createElement("option");
                    errorOption.value = "";
                    errorOption.text = "No se pudo cargar la lista de túneles";
                    select.appendChild(errorOption);
                });
        };
    </script>

    {% if message %}
    <p style="color: green;">{{ message }}</p>
    {% endif %}

    {% if error %}
    <p style="color: red;">{{ error }}</p>
    {% endif %}
{% endblock %}
